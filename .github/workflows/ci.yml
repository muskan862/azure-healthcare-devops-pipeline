name: CI Pipeline - Healthcare Dashboard

on:
  push:
    branches: [ "main" ]

env:
  ACR_NAME: "acrdevopspipelineprod" 
  IMAGE_NAME: "healthcare-dashboard"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flask gunicorn

    - name: Run Basic Health Check Test
      run: |
        python -m py_compile app.py

    - name: Log in to Azure Container Registry Placeholder
      run: |
        echo "Pre-authenticating step configured successfully."