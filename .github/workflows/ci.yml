name: Healthcare Dashboard CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull code from your repository into the runner
    - name: Check out repository code
      uses: actions/checkout@v3

    # 2. Authenticate cleanly with the Docker CLI using safe GitHub Secrets
    - name: Log in to Docker Hub Registry
      uses: docker/login-action@v2
      with:
        username: ${{secrets.DOCKER_USERNAME}}
        password: ${{secrets.DOCKER_PASSWORD}}

    # 3. Compile your Dockerfile and push the image automatically
    - name: Build and Push Production Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: muskan862/healthcare-dashboard:latest